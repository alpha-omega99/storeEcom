services:
  - type: web
    name: chicshop-backend
    runtime: python
    repo: https://github.com/alpha-omega99/storeEcom
    plan: free
    region: frankfurt
    buildCommand: |
      apt-get update && apt-get install -y \
        pkg-config \
        libmysqlclient-dev \
        default-libmysqlclient-dev \
        build-essential
      
      pip install --upgrade pip
      pip install -r requirements.txt
      
      python manage.py collectstatic --noinput --settings=config.settings.production
    
    startCommand: |
      python manage.py migrate --noinput --settings=config.settings.production
      gunicorn config.wsgi:application

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: chicshop-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: chicshop-redis
          type: redis
          property: connectionString
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "chicshop-backend.onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://chicshop-frontend.onrender.com,http://localhost:3000"
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_ADMIN_NUMBER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

  - type: redis
    name: chicshop-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: noeviction

databases:
  - name: chicshop-db
    plan: free
    region: frankfurt