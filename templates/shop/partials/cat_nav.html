<nav class="cat-nav" id="catNav">
  <div class="cat-nav-inner">
    {% for cat in categories %}
    <a href="{% url 'shop:catalog_category' cat.slug %}" data-testid="cat-nav-{{ cat.slug }}">
      <span class="cat-icon">{{ cat.icon }}</span>
      {{ cat.name }}
    </a>
    {% endfor %}
    <a href="{% url 'shop:promotions' %}" class="cat-promo" data-testid="cat-nav-promotions">
      <span class="cat-icon">&#128293;</span> Promotions
    </a>
  </div>
</nav>



{% comment %} {% load static %}

<!-- CATEGORY NAVIGATION -->
<nav class="cat-nav" aria-label="Catégories">
  <div class="cat-nav-inner">
    <a class="cat-btn {% if not current_cat or current_cat == 'all' %}active{% endif %}" 
       href="{% url 'shop:home' %}">
      🏠 Accueil
    </a>
    <a class="cat-btn {% if current_cat == 'pack' %}active{% endif %}" 
       href="{% url 'shop:catalog_category' 'pack' %}">
      🎁 Packs cadeaux
    </a>
    <a class="cat-btn {% if current_cat == 'tapis' %}active{% endif %}" 
       href="{% url 'shop:catalog_category' 'tapis' %}">
      🕌 Tapis de prière
    </a>
    <a class="cat-btn {% if current_cat == 'chapelet' %}active{% endif %}" 
       href="{% url 'shop:catalog_category' 'chapelet' %}">
      📿 Chapelets
    </a>
    <a class="cat-btn {% if request.resolver_match.url_name == 'promotions' %}active{% endif %}" 
       href="{% url 'shop:promotions' %}">
      🔥 Promotions
    </a>
    <a class="cat-btn" href="{% url 'shop:personnaliser' %}">
      ✨ Personnaliser
    </a>
  </div>
</nav>

<style>
  .cat-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  
  .cat-nav::-webkit-scrollbar {
    height: 3px;
  }
  
  .cat-nav::-webkit-scrollbar-track {
    background: var(--border);
  }
  
  .cat-nav::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 10px;
  }
  
  @media (max-width: 768px) {
    .cat-btn {
      padding: 10px 14px;
      font-size: 0.75rem;
    }
  }
</style> {% endcomment %}
