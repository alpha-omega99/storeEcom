<!-- Mini Panier Drawer -->
<div id="cartDrawerOverlay" class="cart-drawer-overlay"></div>

<aside id="cartDrawer" class="cart-drawer" aria-hidden="true" aria-label="Mini panier">
  <div class="cd-head">
    <div class="cd-title">
      🛒 Mon Panier
      <span id="cartDrawerCount" class="cart-count" style="background: var(--primary); color: white; border-radius: var(--radius-full); padding: 2px 8px; font-size: 0.7rem; margin-left: 8px;">0</span>
    </div>
    <button class="cd-close" id="closeCartDrawer" aria-label="Fermer">✕</button>
  </div>
  
  <div class="cd-items" id="cdItems">
    <div style="text-align: center; padding: 40px; color: var(--text-light);">Chargement...</div>
  </div>
  
  <div class="cd-empty" id="cdEmpty" style="display: none; text-align: center; padding: 60px 20px;">
    <div style="font-size: 3rem; margin-bottom: 16px;">🛍️</div>
    <p style="color: var(--text-light);">Votre panier est vide</p>
    <a href="{% url 'shop:catalog' %}" class="btn-primary" style="margin-top: 20px; display: inline-block;">Découvrir</a>
  </div>
  
  <div class="cd-foot" id="cdFoot" style="display: none;">
    <div class="cd-subtotal">
      <span>Sous-total</span>
      <span id="cdSubtotal">0 F</span>
    </div>
    <div class="cd-note" style="font-size: 0.7rem; color: var(--text-light); margin-bottom: 16px; text-align: center;">
      📦 Livraison gratuite à Abidjan<br>✨ Emballage cadeau offert
    </div>
    <a href="{% url 'shop:checkout' %}" class="checkout-btn" style="display: block;">✅ Commander</a>
    <a href="{% url 'shop:cart' %}" style="display: block; text-align: center; margin-top: 12px; font-size: 0.8rem; color: var(--text-light);">Voir le panier détaillé →</a>
  </div>
</aside>

<script>
(function() {
  const drawer = document.getElementById('cartDrawer');
  const overlay = document.getElementById('cartDrawerOverlay');
  const openBtn = document.getElementById('openCartDrawer');
  const closeBtn = document.getElementById('closeCartDrawer');
  
  function openDrawer() {
    if (drawer) {
      drawer.classList.add('open');
      drawer.setAttribute('aria-hidden', 'false');
    }
    if (overlay) overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    if (typeof refreshMiniCart === 'function') refreshMiniCart();
  }
  
  function closeDrawer() {
    if (drawer) {
      drawer.classList.remove('open');
      drawer.setAttribute('aria-hidden', 'true');
    }
    if (overlay) overlay.classList.remove('open');
    document.body.style.overflow = '';
  }
  
  if (openBtn) openBtn.addEventListener('click', (e) => {
    e.preventDefault();
    openDrawer();
  });
  
  if (closeBtn) closeBtn.addEventListener('click', closeDrawer);
  if (overlay) overlay.addEventListener('click', closeDrawer);
  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && drawer && drawer.classList.contains('open')) {
      closeDrawer();
    }
  });
  
  window.refreshMiniCart = async function() {
    const itemsContainer = document.getElementById('cdItems');
    const emptyDiv = document.getElementById('cdEmpty');
    const footDiv = document.getElementById('cdFoot');
    const countSpan = document.getElementById('cartDrawerCount');
    
    if (!itemsContainer) return;
    
    try {
      const data = await apiGet('/panier/mini/');
      
      if (!data.items || data.items.length === 0) {
        itemsContainer.style.display = 'none';
        if (emptyDiv) emptyDiv.style.display = 'block';
        if (footDiv) footDiv.style.display = 'none';
        if (countSpan) countSpan.textContent = '0';
        return;
      }
      
      itemsContainer.style.display = 'block';
      if (emptyDiv) emptyDiv.style.display = 'none';
      if (footDiv) footDiv.style.display = 'block';
      if (countSpan) countSpan.textContent = data.items.length;
      
      let html = '';
      for (const item of data.items) {
        html += `
          <div class="cd-item" data-cart-key="${item.cart_key}">
            <div class="cd-item-img">
              ${item.image ? `<img src="${item.image}" alt="${item.name}">` : `<span style="font-size: 1.5rem;">${item.emoji || '🕌'}</span>`}
            </div>
            <div class="cd-item-info">
              <div class="cd-item-name">${escapeHtml(item.name)}</div>
              ${item.embroidery_name ? `<div class="cd-item-opt">✏️ ${escapeHtml(item.embroidery_name)}</div>` : ''}
              <div class="cd-item-qty">Quantité : ${item.quantity}</div>
              <button class="cd-item-remove" onclick="removeFromCartDrawer('${item.cart_key}')">🗑 Retirer</button>
            </div>
            <div class="cd-item-price">${Number(item.line_total).toLocaleString('fr-FR')} F</div>
          </div>
        `;
      }
      itemsContainer.innerHTML = html;
      
      const subtotalSpan = document.getElementById('cdSubtotal');
      if (subtotalSpan && data.subtotal !== undefined) {
        subtotalSpan.textContent = Number(data.subtotal).toLocaleString('fr-FR') + ' F';
      }
      
    } catch(err) {
      console.warn('[refreshMiniCart]', err);
      itemsContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-light);">⚠️ Erreur de chargement</div>';
    }
  };
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  window.removeFromCartDrawer = async function(cartKey) {
    try {
      const res = await apiPost('/panier/supprimer/', { cart_key: cartKey });
      if (res.error) throw new Error(res.error);
      
      await refreshMiniCart();
      
      if (res.cart_count !== undefined && typeof updateCartBadge === 'function') {
        updateCartBadge(res.cart_count);
      }
      
      showToast('🗑 Article retiré du panier');
      
      if (window.location.pathname === '/panier/') {
        setTimeout(() => location.reload(), 300);
      }
    } catch(err) {
      console.error('[removeFromCartDrawer]', err);
      showToast('❌ ' + err.message, 'error');
    }
  };
  
  document.addEventListener('DOMContentLoaded', refreshMiniCart);
})();
</script>
