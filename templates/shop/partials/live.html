{% load static %}

<!-- LIVE ACTIVITY POPUP -->
<div id="livePopup" class="live-popup" style="display: none;"></div>

<style>
  .live-popup {
    position: fixed;
    bottom: 100px;
    left: 20px;
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 99;
    max-width: 320px;
    animation: slideInLeft 0.4s ease;
    border-left: 4px solid var(--primary);
  }
  
  .live-popup.hide {
    animation: slideOutLeft 0.4s ease forwards;
  }
  
  .lp-avatar {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-full);
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: var(--primary);
  }
  
  .lp-text {
    flex: 1;
    font-size: 0.8rem;
  }
  
  .lp-text strong {
    color: var(--secondary);
  }
  
  .lp-time {
    font-size: 0.65rem;
    color: var(--text-light);
    margin-top: 4px;
  }
  
  @keyframes slideInLeft {
    from {
      opacity: 0;
      transform: translateX(-100px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }
  
  @keyframes slideOutLeft {
    from {
      opacity: 1;
      transform: translateX(0);
    }
    to {
      opacity: 0;
      transform: translateX(-100px);
    }
  }
  
  @media (max-width: 768px) {
    .live-popup {
      bottom: 80px;
      left: 16px;
      right: 16px;
      max-width: calc(100% - 32px);
    }
  }
</style>

<script>
(function() {
  const activities = [
    { initial: 'F', name: 'Fatou D.', action: 'vient de commander L\'Écrin de Sérénité', time: 'Il y a 2 min' },
    { initial: 'A', name: 'Aminata B.', action: 'a ajouté L\'Héritage Royal à son panier', time: 'Il y a 5 min' },
    { initial: 'M', name: 'Mamadou K.', action: 'vient de commander le Pack Mariage', time: 'Il y a 8 min' },
    { initial: 'S', name: 'Salimata O.', action: 'a laissé un avis ★★★★★', time: 'Il y a 12 min' },
    { initial: 'I', name: 'Ibrahim D.', action: 'vient de commander le Duo Essentiel', time: 'Il y a 15 min' },
    { initial: 'K', name: 'Kadiatou M.', action: 'vient de commander le Tapis Rose Poudré', time: 'Il y a 18 min' }
  ];
  
  let index = 0;
  
  function showLiveActivity() {
    const popup = document.getElementById('livePopup');
    if (!popup) return;
    
    const a = activities[index % activities.length];
    index++;
    
    popup.style.display = 'flex';
    popup.innerHTML = `
      <div class="lp-avatar">${a.initial}</div>
      <div class="lp-text">
        <strong>${a.name}</strong> ${a.action}
        <div class="lp-time">🟢 ${a.time}</div>
      </div>
    `;
    popup.classList.remove('hide');
    
    setTimeout(() => {
      popup.classList.add('hide');
      setTimeout(() => { popup.style.display = 'none'; }, 400);
    }, 4500);
  }
  
  setTimeout(() => showLiveActivity(), 3000);
  setInterval(showLiveActivity, 14000);
})();
</script>
